<!-- Botão Admin -->
<button onclick="toggleAdmin()" class="fixed bottom-10 right-10 w-16 h-16 bg-slate-900 text-white rounded-3xl shadow-2xl flex items-center justify-center hover:scale-110 transition z-[60] border-2 border-indigo-600/20">
    ⚙️
</button>

<!-- Admin Overlay -->
<div id="adminOverlay"
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-[70]"
    onclick="toggleAdmin()">
</div>

<!-- Admin Panel -->
<aside id="adminPanel"
    class="fixed top-0 right-0 w-full max-w-md h-full bg-white shadow-2xl z-[80] transition-transform duration-500 translate-x-full overflow-hidden flex flex-col">

    <div class="p-8 border-b flex justify-between items-center bg-slate-50">
        <h2 class="font-black text-xl uppercase italic">
            Painel de Gestão
        </h2>

        <button onclick="toggleAdmin()" class="text-slate-400">
            ✕
        </button>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-10">

        <!-- Tabs -->
        <div class="flex gap-2 p-1.5 bg-slate-100 rounded-2xl">

            <button onclick="switchAdminTab('products')"
                class="flex-1 py-3 text-[10px] font-black rounded-xl bg-white shadow-sm transition uppercase tracking-widest"
                id="btnTabProd">
                Produtos
            </button>

            <button onclick="switchAdminTab('categories')"
                class="flex-1 py-3 text-[10px] font-black text-slate-500 transition uppercase tracking-widest"
                id="btnTabCat">
                Categorias
            </button>

            <button onclick="switchAdminTab('appearance')"
                class="flex-1 py-3 text-[10px] font-black text-slate-500 transition uppercase tracking-widest"
                id="btnTabApper">
                Aparência
            </button>

        </div>

        <!-- Produtos -->
        <div id="adminTabProducts" class="space-y-6">

            <button onclick="openEditor(null)"
                class="w-full py-5 border-2 border-dashed border-indigo-200 rounded-[24px] text-indigo-600 font-black hover:border-indigo-500 transition uppercase text-[10px] tracking-[0.2em]">
                + Novo Item
            </button>

            <div id="adminProductList" class="space-y-3"></div>
        </div>

        <!-- Categorias -->
        <div id="adminTabCategories" class="hidden space-y-6 text-left">

            <div class="p-6 bg-indigo-50 rounded-[28px] border border-indigo-100">

                <label class="block text-[10px] font-black text-indigo-600 uppercase mb-3 tracking-widest">
                    Nova Categoria
                </label>

                <div class="flex gap-2">

                    <input type="text"
                        id="inpNewCategory"
                        placeholder="NOME..."
                        class="flex-1 px-5 py-3 rounded-xl border-none outline-none font-bold text-sm uppercase">

                    <button onclick="addCategory()"
                        class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase shadow-lg">
                        Add
                    </button>

                </div>
            </div>

            <div id="adminCategoryList" class="space-y-2"></div>
        </div>

        <!-- Aparência -->
        <div id="adminTabAppearance" class="hidden space-y-8 text-left">

            <div>

                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">
                    Branding
                </label>

                <input type="text"
                    id="inpStoreName"
                    placeholder="Nome"
                    class="w-full px-5 py-4 rounded-xl bg-slate-50 border-none outline-none mb-3 font-bold"
                    oninput="saveAppearance()">

                <input type="text"
                    id="inpStoreHero"
                    placeholder="Slogan"
                    class="w-full px-5 py-4 rounded-xl bg-slate-50 border-none outline-none font-bold"
                    oninput="saveAppearance()">

            </div>

            <button id="btnGenerateBanner"
                onclick="generateBannerAI()"
                class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-600 transition uppercase tracking-widest text-[10px] italic">

                ✨ Gerar Banner com IA

            </button>

        </div>

    </div>
</aside>

<!-- Editor -->
<div id="editorModal"
    class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-xl">

    <div class="bg-white w-full max-w-xl rounded-[40px] shadow-2xl overflow-hidden flex flex-col">

        <div class="p-8 border-b flex justify-between items-center">

            <h3 id="editorTitle"
                class="font-black text-slate-900 uppercase italic">
                Editor
            </h3>

            <button onclick="closeEditor()" class="text-slate-400">
                ✕
            </button>

        </div>

        <div class="p-10 overflow-y-auto max-h-[70vh] space-y-6 custom-scrollbar">

            <input type="text"
                id="edtName"
                placeholder="Nome do Produto"
                class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold uppercase italic">

            <select id="edtCategory"
                class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-slate-600">
            </select>

            <div class="grid grid-cols-2 gap-4">

                <input type="number"
                    id="edtPrice"
                    placeholder="R$"
                    class="p-5 bg-slate-50 rounded-2xl outline-none font-bold">

                <div class="flex items-center gap-3 p-5 bg-slate-50 rounded-2xl">

                    <input type="checkbox"
                        id="edtIsBestSeller"
                        class="w-6 h-6 rounded-lg accent-indigo-600">

                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                        Destaque
                    </label>

                </div>
            </div>

            <div class="pt-2 text-left">

                <div class="flex justify-between mb-2">

                    <label class="text-[10px] font-black text-slate-400 uppercase">
                        Descrição
                    </label>

                    <button onclick="optimizeDescriptionAI()"
                        class="text-[9px] bg-indigo-600 text-white px-3 py-1 rounded-full font-black uppercase tracking-widest shadow-md">

                        ✨ Otimizar IA

                    </button>

                </div>

                <textarea id="edtDescription"
                    placeholder="Detalhes técnicos..."
                    class="w-full p-5 bg-slate-50 rounded-2xl h-40 outline-none"></textarea>

            </div>

            <input type="text"
                id="edtImage"
                placeholder="URL da Foto do Render"
                class="w-full p-5 bg-slate-50 rounded-2xl outline-none text-xs">

            <input type="text"
                id="edtIcon"
                placeholder="Emoji de Backup (ex: 🏗️)"
                class="w-full p-5 bg-slate-50 rounded-2xl outline-none">

            <select id="edtBadge"
                class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-xs">

                <option value="">Sem Selo</option>
                <option value="badge-sale">Promoção</option>
                <option value="badge-hot">Elite</option>
                <option value="badge-new">Novidade</option>

            </select>

        </div>

        <div class="p-8 bg-slate-50 flex gap-4">

            <button onclick="closeEditor()"
                class="flex-1 font-black text-slate-400 uppercase text-xs">
                Cancelar
            </button>

            <button onclick="commitProduct()"
                class="flex-[3] bg-indigo-600 text-white py-5 rounded-3xl font-black shadow-2xl hover:bg-indigo-700 transition uppercase tracking-widest italic">

                Gravar na Base

            </button>

        </div>

    </div>
</div>

<!-- Toast -->
<div id="toast"
    class="fixed top-24 left-1/2 -translate-x-1/2 px-8 py-4 bg-slate-900 text-white rounded-full text-sm font-bold shadow-2xl opacity-0 transition-all z-[150] pointer-events-none tracking-widest uppercase">
</div>
