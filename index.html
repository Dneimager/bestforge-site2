<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BESTFORGE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo">⚡ BESTFORGE</div>
    <div class="actions">
        <button class="cart">🛒 0</button>
    </div>
</header>

<section class="hero">
    <h1>🚀 Hardware de Alta Performance</h1>
    <p>Os melhores produtos para seu setup</p>

    <div class="search">
        <input type="text" placeholder="Buscar produtos...">
        <button>Buscar</button>
    </div>
</section>

<section class="products">

    <h2>✨ Produtos em Destaque</h2>

    <div class="filters">
        <button class="active">Todos</button>
        <button>3D</button>
        <button>Geek</button>
        <button>Decoração</button>
    </div>

    <div class="grid">

        <div class="card">
            <div class="img">📦</div>
            <h3>Chaveiro Personalizado</h3>
            <p class="price">R$ 14</p>
            <button onclick="comprar('Chaveiro Personalizado')">Comprar</button>
        </div>

        <div class="card">
            <div class="img">📦</div>
            <h3>Base Dragon Ball</h3>
            <p class="price">R$ 54</p>
            <button onclick="comprar('Base Dragon Ball')">Comprar</button>
        </div>

        <div class="card">
            <div class="img">📦</div>
            <h3>Kimono Miniatura</h3>
            <p class="price">R$ 99</p>
            <button onclick="comprar('Kimono Miniatura')">Comprar</button>
        </div>

    </div>

</section>

<script src="script.js"></script>
</body>
</html>
